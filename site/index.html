<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>北京电力交易中心 2025年电力市场年报</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-app="deck">
    <div class="deck-shell">
      <header class="deck-chrome">
        <div>
          <div class="deck-kicker">HTML 演示稿</div>
          <div class="deck-title">北京电力交易中心 2025年电力市场年报</div>
        </div>
        <div class="deck-actions">
          <button type="button" class="deck-button" data-action="prev">上一页</button>
          <button type="button" class="deck-button" data-action="next">下一页</button>
          <button type="button" class="deck-button" data-action="print">打印 / 导出 PDF</button>
          <button type="button" class="deck-button deck-button-primary" data-action="fullscreen">全屏</button>
        </div>
      </header>

      <main class="deck-main">
        <div class="deck-stage">
          <iframe id="slide-frame" title="slide frame" loading="eager"></iframe>
        </div>
      </main>

      <footer class="deck-footer">
        <div class="deck-meta">
          <span id="slide-counter">1 / 15</span>
          <span id="slide-name">封面</span>
        </div>
        <div class="deck-hint">键盘支持：← → Space PageUp PageDown Home End，按 F 全屏，打印按钮可导出 PDF</div>
      </footer>
    </div>

    <section id="print-shell" class="print-shell" aria-label="print slides"></section>

    <script src="assets/app.js"></script>
  </body>
</html>
