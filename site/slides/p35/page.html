    <!doctype html>
    <html lang="zh-CN">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <link rel="stylesheet" href="../../assets/styles.css">
    </head>
    <body data-app="slide">

<div class="slide theme-coral">
  <div class="slide-inner">
    <div class="slide-top">
      <div><div class="slide-kicker">储能策略</div><h2 class="slide-title">独立储能盈利模型分析</h2></div>
      <div class="mini-chip">35 / 40</div>
    </div>
    <div class="two-col" data-animate>
      <div class="stack">
        <div class="panel">
          <h3 style="margin:0 0 12px;">收入来源构成（100MW/200MWh）</h3>
          <div class="chart" data-type="hbars" data-points="峰谷套利:4200;辅助服务(调频):2800;容量补偿:1800;容量租赁:1200;绿证增值:400"></div>
          <p style="margin:10px 0 0;font-size:13px;color:var(--ink-soft);">预计年收入（万元），合计约 1.04 亿</p>
        </div>
      </div>
      <div class="stack">
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">投资总额</div><div class="stat-value">5.6亿</div><div class="stat-note">含建设+接入</div></div>
          <div class="stat-card"><div class="stat-label">年净收入</div><div class="stat-value">~1.04亿</div><div class="stat-note">五项收入合计</div></div>
          <div class="stat-card"><div class="stat-label">项目IRR</div><div class="stat-value">8-12%</div><div class="stat-note">含税 20年期</div></div>
          <div class="stat-card"><div class="stat-label">回收期</div><div class="stat-value">5.5-6.5年</div><div class="stat-note">静态回收</div></div>
        </div>
        <div class="info-card">
          <h3 style="margin:0 0 10px;font-size:16px;">关键假设</h3>
          <p style="margin:0;font-size:14px;color:var(--ink-soft);line-height:1.6;">EPC 1.2元/Wh · 系统效率88% · 日均1.5-2次循环 · 峰谷价差0.55元/kWh · 容量补偿300元/kW·年</p>
        </div>
      </div>
    </div>
    <div class="slide-bottom"><div class="footer-note">第五篇 · 独立储能投资策略</div></div>
  </div>
</div>
    <script src="../../assets/app.js"></script>
</body>
    </html>
