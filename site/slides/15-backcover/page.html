<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>15 封底</title>
    <link rel="stylesheet" href="../../assets/styles.css">
  </head>
  <body data-app="slide">
    <main class="slide theme-navy">
      <div class="slide-inner">
        <header class="slide-top">
          <div class="section-chip" data-animate style="--delay: 0.05s;"><strong>15</strong> 封底</div>
          <div class="page-chip" data-animate style="--delay: 0.1s;">归档页</div>
        </header>

        <section class="closing-grid">
          <div class="closing-statement">
            <div class="slide-kicker" data-animate style="--delay: 0.12s;">Thank You</div>
            <h2 data-animate style="--delay: 0.18s;">谢谢</h2>
            <p data-animate style="--delay: 0.28s;">北京电力交易中心 2025年电力市场年报汇报稿。基于年报材料重构，适用于正式汇报展示与 PDF 归档。</p>
          </div>

          <div class="stack">
            <div class="quote-panel" data-animate style="--delay: 0.36s;">
              <div class="quote-label">收尾判断</div>
              <div class="quote-text">全国统一电力市场，已从建设阶段走向持续运营阶段。</div>
            </div>
            <div class="info-card" data-animate style="--delay: 0.56s;">
              <div class="section-heading">
                <h3>归档说明</h3>
              </div>
              <p class="lede">HTML 演示稿支持现场翻页展示、打印导出和单页独立修改。本页建议保留在 PDF 末页作为封底。</p>
            </div>
          </div>
        </section>

        <footer class="slide-bottom">
          <div class="footer-note">北京电力交易中心有限公司</div>
          <div class="mini-chip">15 / 15</div>
        </footer>
      </div>
    </main>
    <script src="../../assets/app.js"></script>
  </body>
</html>
