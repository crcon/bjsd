<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北京电力交易中心 · 2025年电力市场年报</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060e1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
      user-select: none;
    }

    #shell {
      width: 100%;
      max-width: 1600px;
      padding: 0 20px 10px;
    }

    /* 进度条 */
    #prog-wrap {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-bottom: 8px;
    }
    #prog-bar {
      height: 100%;
      background: linear-gradient(90deg, #1565C0, #00BCD4);
      border-radius: 2px;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    /* 幻灯片容器：维持 16:9 */
    #stage {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
    }
    #stage iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 全屏覆盖层（过渡动效） */
    #overlay {
      position: absolute;
      inset: 0;
      background: #060e1a;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
      z-index: 10;
    }
    #overlay.flash { opacity: 1; }

    /* 控制栏 */
    #ctrl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 6px;
      color: #7A9CC0;
    }

    .nav-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #cde;
      padding: 7px 22px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }
    .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.13); transform: scale(1.03); }
    .nav-btn:active:not(:disabled) { transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.22; cursor: not-allowed; }

    #info-center { display: flex; align-items: center; gap: 14px; }
    #slide-num { font-size: 13px; color: #607D8B; letter-spacing: 0.05em; }

    #fs-btn {
      background: rgba(21,101,192,0.18);
      border: 1px solid rgba(21,101,192,0.35);
      color: #64B5F6;
      padding: 6px 14px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.2s;
    }
    #fs-btn:hover { background: rgba(21,101,192,0.30); }

    /* 幻灯片缩略图导航点 */
    #dots {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .dot.active { background: #42A5F5; transform: scale(1.3); }
    .dot:hover { background: rgba(255,255,255,0.35); }

    #hint { text-align: center; font-size: 11px; color: rgba(255,255,255,0.15); padding-bottom: 4px; }

    /* ===== 全屏模式 ===== */
    :fullscreen body, :-webkit-full-screen body {
      padding: 0;
      background: #000;
      justify-content: center;
    }
    :fullscreen #shell, :-webkit-full-screen #shell {
      max-width: 100vw;
      width: 100vw;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    :fullscreen #stage, :-webkit-full-screen #stage {
      width: min(100vw, 177.78vh);
      padding-top: 0;
      height: min(100vh, 56.25vw);
      border-radius: 0;
    }
    :fullscreen #prog-wrap,
    :fullscreen #ctrl,
    :fullscreen #hint,
    :-webkit-full-screen #prog-wrap,
    :-webkit-full-screen #ctrl,
    :-webkit-full-screen #hint { display: none; }
  </style>
</head>
<body>
<div id="shell">
  <div id="prog-wrap"><div id="prog-bar"></div></div>
  <div id="stage">
    <iframe id="frame" src="pages/01-cover.html" title="幻灯片"></iframe>
    <div id="overlay"></div>
  </div>
  <div id="ctrl">
    <button class="nav-btn" id="prev-btn" onclick="go(-1)">‹ 上一页</button>
    <div id="info-center">
      <div id="dots"></div>
      <span id="slide-num">1 / 22</span>
      <button id="fs-btn" onclick="toggleFS()">⛶ 全屏</button>
    </div>
    <button class="nav-btn" id="next-btn" onclick="go(1)">下一页 ›</button>
  </div>
  <div id="hint">← → 方向键翻页 &nbsp;·&nbsp; F 键全屏 &nbsp;·&nbsp; 点击圆点跳转</div>
</div>

<script>
const SLIDES = [
  'pages/01-cover.html',
  'pages/02-toc.html',
  'pages/03-ch1-title.html',
  'pages/04-power-demand.html',
  'pages/05-capacity.html',
  'pages/06-market-members.html',
  'pages/07-market-trade.html',
  'pages/08-interprovincial-clean.html',
  'pages/09-new-energy-green.html',
  'pages/10-ch2-policy.html',
  'pages/11-policy-details.html',
  'pages/12-ch3-title.html',
  'pages/13-results-supply.html',
  'pages/14-results-green.html',
  'pages/15-ch4-title.html',
  'pages/16-unified-market.html',
  'pages/17-cross-region.html',
  'pages/18-full-coverage.html',
  'pages/19-green-market.html',
  'pages/20-capacity-retail.html',
  'pages/21-ch5-operations.html',
  'pages/22-conclusion.html',
];

let cur = 0;

function renderDots() {
  const c = document.getElementById('dots');
  c.innerHTML = '';
  SLIDES.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === cur ? ' active' : '');
    d.onclick = () => jump(i);
    d.title = `第 ${i+1} 页`;
    c.appendChild(d);
  });
}

function update(skipAnim) {
  const fr = document.getElementById('frame');
  const ov = document.getElementById('overlay');
  const pb = document.getElementById('prog-bar');
  if (!skipAnim) {
    ov.classList.add('flash');
    setTimeout(() => { fr.src = SLIDES[cur]; ov.classList.remove('flash'); }, 160);
  } else {
    fr.src = SLIDES[cur];
  }
  document.getElementById('prev-btn').disabled = cur === 0;
  document.getElementById('next-btn').disabled = cur === SLIDES.length - 1;
  document.getElementById('slide-num').textContent = `${cur + 1} / ${SLIDES.length}`;
  pb.style.width = `${((cur + 1) / SLIDES.length) * 100}%`;
  renderDots();
}

function go(dir) {
  const n = cur + dir;
  if (n < 0 || n >= SLIDES.length) return;
  cur = n;
  update();
}

function jump(idx) {
  cur = idx;
  update();
}

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}

document.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  switch(e.key) {
    case 'ArrowRight': case 'ArrowDown': case 'PageDown': case ' ':
      e.preventDefault(); go(1); break;
    case 'ArrowLeft': case 'ArrowUp': case 'PageUp':
      e.preventDefault(); go(-1); break;
    case 'f': case 'F':
      toggleFS(); break;
    case 'Home':
      cur = 0; update(); break;
    case 'End':
      cur = SLIDES.length - 1; update(); break;
  }
});

update(true);
</script>
</body>
</html>
