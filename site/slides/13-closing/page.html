<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>14 结论页</title>
    <link rel="stylesheet" href="../../assets/styles.css">
  </head>
  <body data-app="slide">
    <main class="slide theme-navy">
      <div class="slide-inner">
        <header class="slide-top">
          <div class="section-chip" data-animate style="--delay: 0.05s;"><strong>14</strong> 结论页</div>
          <div class="page-chip" data-animate style="--delay: 0.1s;">汇报收束</div>
        </header>

        <section class="closing-grid">
          <div class="closing-statement">
            <div class="slide-kicker" data-animate style="--delay: 0.12s;">Final Takeaway</div>
            <h2 data-animate style="--delay: 0.18s;">2025 年是全国统一电力市场<br>“建成阶段”与“运营阶段”的分界点</h2>
            <p data-animate style="--delay: 0.28s;">这一年完成的，不只是市场扩容，而是统一规则、跨区协同、绿色价值和运营底座的第一次系统搭建。后续竞争焦点将切换到运营质量、价格传导、风险控制与统一评价。</p>
          </div>

          <div class="stack">
            <div class="list-item" data-animate style="--delay: 0.32s;">
              <div class="item-title">第一条结论</div>
              <div class="item-text">规则体系、跨区机制、省级覆盖和绿色市场已经完成第一轮系统搭建。</div>
            </div>
            <div class="list-item" data-animate style="--delay: 0.4s;">
              <div class="item-title">第二条结论</div>
              <div class="item-text">后续重点将从建设进度转向运营质量、价格机制、风险控制和统一评价。</div>
            </div>
            <div class="list-item" data-animate style="--delay: 0.48s;">
              <div class="item-title">第三条结论</div>
              <div class="item-text">对交易机构而言，平台化、标准化、服务化将成为长期竞争力。</div>
            </div>
            <div class="quote-panel" data-animate style="--delay: 0.62s;">
              <div class="quote-label">金句</div>
              <div class="quote-text">市场已经建起来，下一步要把它运行好、评价准、价值传导清。</div>
            </div>
          </div>
        </section>

        <footer class="slide-bottom">
          <div class="footer-note" data-animate style="--delay: 0.74s;">谢谢</div>
          <div class="mini-chip" data-animate style="--delay: 0.8s;">14 / 15</div>
        </footer>
      </div>
    </main>
    <script src="../../assets/app.js"></script>
