    <!doctype html>
    <html lang="zh-CN">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <link rel="stylesheet" href="../../assets/styles.css">
    </head>
    <body data-app="slide">

<div class="slide theme-gold">
  <div class="slide-inner">
    <div class="slide-top">
      <div><div class="slide-kicker">四川专题</div><h2 class="slide-title">四川省储能发展现状</h2></div>
      <div class="mini-chip">32 / 40</div>
    </div>
    <div class="two-col" data-animate>
      <div class="stack">
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">已建抽蓄</div><div class="stat-value">120万kW</div><div class="stat-note">龙头石等</div></div>
          <div class="stat-card"><div class="stat-label">在建抽蓄</div><div class="stat-value">960万kW</div><div class="stat-note">道孚、天全等</div></div>
          <div class="stat-card"><div class="stat-label">新型储能</div><div class="stat-value">85万kW</div><div class="stat-note">已并网（锂电为主）</div></div>
          <div class="stat-card"><div class="stat-label">规划目标</div><div class="stat-value">500万kW</div><div class="stat-note">2027年新型储能</div></div>
        </div>
      </div>
      <div class="stack">
        <div class="info-card">
          <h3 style="margin:0 0 10px;font-size:18px;">政策驱动</h3>
          <div class="list">
            <div class="list-item"><div class="item-title">新能源配储要求</div><div class="item-text">风光项目配建10-20%/2h储能</div></div>
            <div class="list-item"><div class="item-title">独立储能鼓励</div><div class="item-text">独立储能享受两部制电价+容量补偿</div></div>
            <div class="list-item"><div class="item-title">辅助服务准入</div><div class="item-text">储能纳入调频市场，补偿标准具竞争力</div></div>
          </div>
        </div>
        <div class="info-card">
          <h3 style="margin:0 0 10px;font-size:16px;">差距与机会</h3>
          <p style="margin:0;font-size:14px;color:var(--ink-soft);line-height:1.6;">当前新型储能仅占装机0.6%，远低于全国1.5%平均水平，增长空间巨大</p>
        </div>
      </div>
    </div>
    <div class="slide-bottom"><div class="footer-note">第四篇 · 四川省电力市场专题</div></div>
  </div>
</div>
